<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Путь — дневник целей</title>
<style>
  :root{
    --radius-lg:20px;
    --radius-md:16px;
    --radius-sm:11px;
    --ease: cubic-bezier(0.22,0.61,0.36,1);
  }
  html[data-theme="light"]{
    --bg:#f5f5f7;
    --surface:#ffffff;
    --surface-2:#fbfbfc;
    --surface-sunken:#f0f0f2;
    --text-primary:#1d1d1f;
    --text-secondary:#6e6e73;
    --text-tertiary:#a1a1a6;
    --border:rgba(0,0,0,0.075);
    --border-soft:rgba(0,0,0,0.045);
    --shadow-1:0 1px 2px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.03);
    --shadow-2:0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-3:0 16px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
    --sidebar-bg:rgba(255,255,255,0.72);
    --blue:#0071e3; --blue-soft:#e8f2fe; --blue-text:#0058b3;
    --green:#28c840; --green-soft:#e5f9e8; --green-text:#1a8f2c;
    --orange:#ff9500; --orange-soft:#fff2e0; --orange-text:#b56a00;
    --pink:#ff2d55; --pink-soft:#ffe6ec; --pink-text:#c4123d;
  }
  html[data-theme="dark"]{
    --bg:#000000;
    --surface:#1c1c1e;
    --surface-2:#161618;
    --surface-sunken:#000000;
    --text-primary:#f5f5f7;
    --text-secondary:#98989d;
    --text-tertiary:#636366;
    --border:rgba(255,255,255,0.09);
    --border-soft:rgba(255,255,255,0.06);
    --shadow-1:0 1px 2px rgba(0,0,0,0.4);
    --shadow-2:0 4px 18px rgba(0,0,0,0.5);
    --shadow-3:0 20px 48px rgba(0,0,0,0.6);
    --sidebar-bg:rgba(20,20,22,0.72);
    --blue:#0a84ff; --blue-soft:rgba(10,132,255,0.16); --blue-text:#5eb2ff;
    --green:#32d74b; --green-soft:rgba(50,215,75,0.16); --green-text:#5fe377;
    --orange:#ff9f0a; --orange-soft:rgba(255,159,10,0.16); --orange-text:#ffb340;
    --pink:#ff375f; --pink-soft:rgba(255,55,95,0.16); --pink-text:#ff6b87;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg);
    color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    transition:background .35s var(--ease), color .35s var(--ease);
  }
  .app{ display:flex; min-height:100vh; }

  .sidebar{
    width:246px; flex-shrink:0;
    padding:28px 14px;
    display:flex; flex-direction:column; gap:2px;
    background:var(--sidebar-bg);
    -webkit-backdrop-filter:blur(20px);
    backdrop-filter:blur(20px);
    border-right:0.5px solid var(--border);
  }
  .brand{ display:flex; align-items:center; gap:10px; padding:2px 10px; margin-bottom:30px; }
  .brand-mark{
    width:30px; height:30px; border-radius:9px;
    background:linear-gradient(155deg,#3a3a3c,#1d1d1f);
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .brand-mark svg{ width:16px; height:16px; }
  .brand-name{ font-size:16px; font-weight:650; letter-spacing:-0.02em; }

  .nav-item{
    display:flex; align-items:center; gap:11px;
    padding:9px 11px; border-radius:var(--radius-sm);
    font-size:13.5px; font-weight:510; color:var(--text-secondary);
    cursor:pointer; transition:background .16s var(--ease), color .16s var(--ease);
    user-select:none;
  }
  .nav-item svg{ width:17px; height:17px; opacity:.8; flex-shrink:0; }
  .nav-item:hover{ background:var(--border-soft); color:var(--text-primary); }
  .nav-item.active{ background:var(--blue-soft); color:var(--blue-text); }
  .nav-item.active svg{ opacity:1; stroke:var(--blue-text); }

  .sidebar-footer{
    margin-top:auto; padding:13px 14px;
    border-radius:var(--radius-md);
    background:var(--surface); border:0.5px solid var(--border-soft);
    box-shadow:var(--shadow-1);
  }
  .sidebar-footer .sf-label{ font-size:11px; color:var(--text-tertiary); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  .sidebar-footer .sf-value{ font-size:20px; font-weight:700; letter-spacing:-0.02em; }
  .sidebar-footer .sf-sub{ font-size:11.5px; color:var(--text-secondary); margin-top:1px; }

  .main{ flex:1; padding:34px 46px 60px; max-width:1080px; }
  .topbar{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; }
  .greeting-eyebrow{ font-size:13px; color:var(--text-secondary); font-weight:520; margin-bottom:5px; text-transform:capitalize; }
  .greeting{ font-size:33px; font-weight:700; letter-spacing:-0.03em; }

  .top-actions{ display:flex; align-items:center; gap:10px; margin-top:2px; }
  .theme-toggle{
    width:36px; height:36px; border-radius:50%;
    border:0.5px solid var(--border);
    background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:var(--shadow-1);
    transition:transform .15s var(--ease), background .2s var(--ease);
    position:relative; overflow:hidden;
  }
  .theme-toggle:active{ transform:scale(0.92); }
  .theme-toggle svg{ width:17px; height:17px; position:absolute; transition:opacity .25s var(--ease), transform .35s var(--ease); }
  .icon-sun{ opacity:0; transform:rotate(-60deg) scale(0.6); color:#ff9500; }
  .icon-moon{ opacity:1; transform:rotate(0) scale(1); color:#5f5f66; }
  html[data-theme="dark"] .icon-sun{ opacity:1; transform:rotate(0) scale(1); }
  html[data-theme="dark"] .icon-moon{ opacity:0; transform:rotate(60deg) scale(0.6); }

  .add-goal-btn{
    display:flex; align-items:center; gap:6px;
    background:var(--text-primary); color:var(--bg);
    border:none; padding:9px 18px 9px 14px;
    border-radius:980px; font-size:13.5px; font-weight:600;
    cursor:pointer; box-shadow:var(--shadow-1);
    transition:transform .15s var(--ease), filter .15s var(--ease);
  }
  html[data-theme="dark"] .add-goal-btn{ color:#000; }
  .add-goal-btn:hover{ filter:brightness(1.15); }
  .add-goal-btn:active{ transform:scale(0.96); }
  .add-goal-btn svg{ width:14px; height:14px; }

  .summary-line{
    font-size:14px; color:var(--text-secondary); margin-bottom:30px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .summary-line b{ color:var(--text-primary); font-weight:650; }
  .summary-dot{ width:3px; height:3px; border-radius:50%; background:var(--text-tertiary); }

  .section-header{ display:flex; align-items:baseline; justify-content:space-between; margin:0 0 14px; }
  .section-title{ font-size:20px; font-weight:700; letter-spacing:-0.015em; }
  .section-hint{ font-size:12.5px; color:var(--text-tertiary); font-weight:500; }

  .goals-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(258px, 1fr)); gap:14px; }
  .goal-card{
    background:var(--surface); border-radius:var(--radius-lg);
    padding:22px 22px 20px; border:0.5px solid var(--border-soft);
    box-shadow:var(--shadow-1);
    transition:transform .22s var(--ease), box-shadow .22s var(--ease), border-color .22s var(--ease);
  }
  .goal-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-3); border-color:var(--border); }
  .goal-card.ghost{
    border:1.5px dashed var(--border);
    box-shadow:none;
    background:transparent;
    position:relative;
  }
  .goal-card.ghost:hover{ transform:none; box-shadow:none; border-color:var(--border); }
  .goal-card.ghost .goal-icon,
  .goal-card.ghost .streak-chip,
  .goal-card.ghost .goal-name,
  .goal-card.ghost .goal-meta,
  .goal-card.ghost .week-track{ opacity:0.45; }
  .goal-card.ghost .checkin-btn{
    background:transparent; color:var(--text-tertiary);
    border:0.5px solid var(--border); cursor:default;
  }
  .ghost-badge{
    position:absolute; top:-10px; left:20px;
    background:var(--bg); color:var(--text-tertiary);
    font-size:11px; font-weight:650; letter-spacing:.02em;
    padding:2px 9px; border-radius:980px; border:0.5px solid var(--border);
  }
  .goal-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .goal-icon{ width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .goal-icon svg{ width:20px; height:20px; }
  .streak-chip{
    display:flex; align-items:center; gap:4px;
    background:var(--orange-soft); color:var(--orange-text);
    font-size:12px; font-weight:700; padding:4px 10px 4px 7px; border-radius:980px;
  }
  .streak-chip svg{ width:11px; height:11px; }
  .goal-name{ font-size:16px; font-weight:650; letter-spacing:-0.01em; margin-bottom:2px; }
  .goal-meta{ font-size:12.5px; color:var(--text-secondary); margin-bottom:17px; }
  .week-track{ display:flex; gap:5px; margin-bottom:17px; }
  .day-dot{ flex:1; height:6px; border-radius:4px; background:var(--surface-sunken); transition:background .25s var(--ease); }
  .day-dot.done{ background:var(--goal-color, var(--blue)); }
  .day-dot.today{ box-shadow:0 0 0 2px var(--border); }
  .checkin-btn{
    width:100%; border:none; padding:11px; border-radius:var(--radius-sm);
    font-size:13.5px; font-weight:650; cursor:pointer;
    transition:background .18s var(--ease), color .18s var(--ease), transform .1s var(--ease), filter .15s var(--ease);
  }
  .checkin-btn:active{ transform:scale(0.98); }
  .checkin-btn.pending{ background:var(--goal-color-soft, var(--blue-soft)); color:var(--goal-color, var(--blue)); }
  .checkin-btn.pending:hover{ filter:brightness(0.97); }
  html[data-theme="dark"] .checkin-btn.pending:hover{ filter:brightness(1.3); }
  .checkin-btn.done{ background:var(--surface-sunken); color:var(--text-secondary); }
  .checkin-btn.done svg{ width:13px; height:13px; vertical-align:-2px; margin-right:4px; }

  .journal-card{
    background:var(--surface); border-radius:var(--radius-lg);
    padding:26px 30px; margin-top:32px;
    border:0.5px solid var(--border-soft); box-shadow:var(--shadow-1);
  }
  .journal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .journal-head h3{ font-size:17px; font-weight:700; letter-spacing:-0.01em; }
  .journal-head span{ font-size:12.5px; color:var(--text-tertiary); }
  textarea{
    width:100%; border:0.5px solid var(--border); border-radius:var(--radius-sm);
    padding:14px 16px; font-family:inherit; font-size:14.5px; color:var(--text-primary);
    resize:none; min-height:64px; background:var(--surface-sunken);
    transition:border-color .15s var(--ease); line-height:1.5;
  }
  textarea::placeholder{ color:var(--text-tertiary); }
  textarea:focus{ outline:none; border-color:var(--blue); }
  .journal-actions{ display:flex; justify-content:flex-end; margin-top:12px; }
  .save-entry-btn{
    background:var(--blue); color:#fff; border:none; padding:9px 20px;
    border-radius:980px; font-size:13.5px; font-weight:650; cursor:pointer;
    transition:filter .15s var(--ease), transform .1s var(--ease);
  }
  .save-entry-btn:hover{ filter:brightness(1.08); }
  .save-entry-btn:active{ transform:scale(0.96); }
  .entry-list{ margin-top:6px; display:flex; flex-direction:column; }
  .entry-item{ display:flex; gap:14px; padding:13px 0; border-top:0.5px solid var(--border-soft); }
  .entry-date{ font-size:12px; color:var(--text-tertiary); min-width:64px; padding-top:1px; font-weight:600; }
  .entry-text{ font-size:13.5px; line-height:1.55; color:var(--text-primary); }

  .goal-card{ position:relative; }
  .goal-delete{
    position:absolute; top:14px; right:14px;
    width:24px; height:24px; border-radius:50%;
    border:none; background:var(--surface-sunken); color:var(--text-tertiary);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; transition:opacity .15s var(--ease), background .15s var(--ease), color .15s var(--ease);
  }
  .goal-delete svg{ width:12px; height:12px; }
  .goal-card:hover .goal-delete{ opacity:1; }
  .goal-delete:hover{ background:var(--pink-soft); color:var(--pink-text); }
  .goal-card.ghost .goal-delete{ display:none; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.35);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .28s var(--ease), visibility 0s linear .28s;
  }
  .modal-overlay.open{
    opacity:1; visibility:visible; pointer-events:auto;
    transition:opacity .28s var(--ease), visibility 0s linear 0s;
  }
  .modal{
    width:100%; max-width:380px;
    background:var(--surface); border-radius:var(--radius-lg);
    border:0.5px solid var(--border-soft); box-shadow:var(--shadow-3);
    padding:22px 24px 24px;
    opacity:0; transform:scale(0.9) translateY(14px);
    transition:opacity .22s var(--ease), transform .32s cubic-bezier(0.34,1.4,0.64,1);
  }
  .modal-overlay.open .modal{
    opacity:1; transform:scale(1) translateY(0);
    transition:opacity .26s var(--ease) .05s, transform .38s cubic-bezier(0.34,1.4,0.64,1) .05s;
  }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .modal-title{ font-size:17px; font-weight:700; letter-spacing:-0.01em; }
  .modal-close{
    width:26px; height:26px; border-radius:50%; border:none;
    background:var(--surface-sunken); color:var(--text-secondary);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .modal-close svg{ width:13px; height:13px; }
  .field-label{ display:block; font-size:12px; font-weight:650; color:var(--text-secondary); margin:14px 0 6px; }
  .field-label:first-of-type{ margin-top:0; }
  .text-input{
    width:100%; border:0.5px solid var(--border); border-radius:var(--radius-sm);
    padding:10px 13px; font-family:inherit; font-size:14px; color:var(--text-primary);
    background:var(--surface-sunken); transition:border-color .15s var(--ease);
  }
  .text-input::placeholder{ color:var(--text-tertiary); }
  .text-input:focus{ outline:none; border-color:var(--blue); }
  .icon-picker{ display:grid; grid-template-columns:repeat(6, 1fr); gap:7px; }
  .icon-opt{
    aspect-ratio:1; border-radius:var(--radius-sm); border:0.5px solid var(--border);
    background:var(--surface-sunken); display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text-secondary); transition:background .15s var(--ease), border-color .15s var(--ease), color .15s var(--ease);
  }
  .icon-opt svg{ width:16px; height:16px; }
  .icon-opt.selected{ background:var(--blue-soft); border-color:var(--blue); color:var(--blue-text); }
  .color-picker{ display:flex; gap:10px; }
  .color-opt{
    width:28px; height:28px; border-radius:50%; cursor:pointer;
    border:2px solid transparent; position:relative;
    transition:transform .15s var(--ease);
  }
  .color-opt.selected{ transform:scale(1.1); border-color:var(--text-primary); }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:22px; }
  .modal-cancel{
    background:transparent; color:var(--text-secondary); border:0.5px solid var(--border);
    padding:9px 16px; border-radius:980px; font-size:13.5px; font-weight:600; cursor:pointer;
  }
  .modal-cancel:hover{ background:var(--surface-sunken); }
  .modal-submit{
    background:var(--blue); color:#fff; border:none;
    padding:9px 18px; border-radius:980px; font-size:13.5px; font-weight:650; cursor:pointer;
    transition:filter .15s var(--ease);
  }
  .modal-submit:hover{ filter:brightness(1.08); }
  .modal-submit:disabled{ opacity:0.45; cursor:default; }

  @media (max-width:820px){
    .app{ flex-direction:column; }
    .sidebar{ width:100%; flex-direction:row; overflow-x:auto; padding:14px; border-right:none; border-bottom:0.5px solid var(--border); }
    .sidebar-footer{ display:none; }
    .brand{ margin-bottom:0; }
    .main{ padding:24px; }
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
      </div>
      <div class="brand-name">Путь</div>
    </div>

    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
      Сегодня
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
      Цели
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h13a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z"/><path d="M4 17a3 3 0 0 0 3 3h13"/></svg>
      Дневник
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M12 20V4"/><path d="M20 20v-7"/></svg>
      Статистика
    </div>

    <div class="sidebar-footer">
      <div class="sf-label">Лучший стрик</div>
      <div class="sf-value"><span id="best-streak">—</span> дней</div>
      <div class="sf-sub">Продолжай в том же духе</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="greeting-eyebrow" id="today-date">—</div>
        <div class="greeting">Доброе утро</div>
      </div>
      <div class="top-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Переключить тему">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 14.5a8.5 8.5 0 0 1-11-11 8.5 8.5 0 1 0 11 11z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.2M12 19.3v2.2M21.5 12h-2.2M4.7 12H2.5M18.4 5.6l-1.5 1.5M7.1 16.9l-1.5 1.5M18.4 18.4l-1.5-1.5M7.1 7.1L5.6 5.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button class="add-goal-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Новая цель
        </button>
      </div>
    </div>

    <div class="summary-line" id="summary-line"></div>

    <div class="section-header">
      <div class="section-title">Твои цели</div>
      <div class="section-hint" id="goals-hint"></div>
    </div>
    <div class="goals-grid" id="goals-grid"></div>

    <div class="journal-card">
      <div class="journal-head">
        <h3>Быстрая запись</h3>
        <span id="journal-date"></span>
      </div>
      <textarea id="journal-input" placeholder="Как прошёл день? Что получилось, а что нет..."></textarea>
      <div class="journal-actions">
        <button class="save-entry-btn" id="save-entry">Сохранить запись</button>
      </div>
      <div class="entry-list" id="entry-list"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Новая цель</div>
      <button class="modal-close" id="modal-close" aria-label="Закрыть">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <label class="field-label" for="goal-name-input">Название</label>
    <input type="text" id="goal-name-input" class="text-input" placeholder="Например, Бегать по утрам" maxlength="40">

    <label class="field-label" for="goal-meta-input">Описание</label>
    <input type="text" id="goal-meta-input" class="text-input" placeholder="Например, 5 км, каждый день" maxlength="60">

    <label class="field-label">Иконка</label>
    <div class="icon-picker" id="icon-picker"></div>

    <label class="field-label">Цвет</label>
    <div class="color-picker" id="color-picker"></div>

    <div class="modal-actions">
      <button class="modal-cancel" id="modal-cancel">Отмена</button>
      <button class="modal-submit" id="modal-submit">Создать цель</button>
    </div>
  </div>
</div>

<script>
const colorVars = {
  blue:   { main:'var(--blue)',   soft:'var(--blue-soft)' },
  green:  { main:'var(--green)',  soft:'var(--green-soft)' },
  orange: { main:'var(--orange)', soft:'var(--orange-soft)' },
  pink:   { main:'var(--pink)',   soft:'var(--pink-soft)' },
};

const icons = {
  run: '<circle cx="12" cy="5" r="1.5"/><path d="M9 20l2-6 -3-3 1-5 4 2 2 4h3"/><path d="M8 14l-3 2"/>',
  book: '<path d="M4 4h13a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z"/><path d="M4 17a3 3 0 0 0 3 3h13"/>',
  meditate: '<circle cx="12" cy="6" r="2"/><path d="M4 18c2-3 5-4 8-4s6 1 8 4"/><path d="M8 14l-3 4"/><path d="M16 14l3 4"/>',
  language: '<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 0 1 0 18"/><path d="M12 3a15 15 0 0 0 0 18"/>',
  target: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>',
  water: '<path d="M12 3c3 4 6 8 6 12a6 6 0 0 1-12 0c0-4 3-8 6-12z"/>',
  dumbbell: '<path d="M6 8v8M18 8v8"/><path d="M2 10v4M22 10v4"/><path d="M6 12h12"/>',
  pencil: '<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',
  music: '<circle cx="7" cy="18" r="2.5"/><circle cx="17" cy="16" r="2.5"/><path d="M9.5 18V6l10-2v12"/>',
  sun: '<circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.2M12 19.3v2.2M21.5 12h-2.2M4.7 12H2.5M18.4 5.6l-1.5 1.5M7.1 16.9l-1.5 1.5M18.4 18.4l-1.5-1.5M7.1 7.1L5.6 5.6"/>',
  wallet: '<rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M16 12.5h2.5"/><path d="M3 9.5h18"/>',
  brain: '<path d="M9 4a3 3 0 0 0-3 3v1a3 3 0 0 0-1 5.5A3 3 0 0 0 8 18h1v-9a3 3 0 0 1 0-5z"/><path d="M15 4a3 3 0 0 1 3 3v1a3 3 0 0 1 1 5.5A3 3 0 0 1 16 18h-1v-9a3 3 0 0 0 0-5z"/>',
};
const iconOrder = ['target','run','book','meditate','language','water','dumbbell','pencil','music','sun','wallet','brain'];
const colorOrder = ['blue','green','orange','pink'];

let goals = [];

const ghostGoal = {
  name:'Бегать по утрам', meta:'5 км, каждый день', color:'blue', icon:'run',
  streak:12, week:[1,1,1,0,1,1,1]
};

let entries = [];
const grid = document.getElementById('goals-grid');
const todayIdx = 6;

function renderDate(){
  const now = new Date();
  document.getElementById('today-date').textContent = now.toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long' });
  document.getElementById('journal-date').textContent = now.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
  const hour = now.getHours();
  document.querySelector('.greeting').textContent = hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';
}

function renderGoals(){
  grid.innerHTML = '';

  if (goals.length === 0){
    const c = colorVars[ghostGoal.color];
    const ghost = document.createElement('div');
    ghost.className = 'goal-card ghost';
    ghost.style.setProperty('--goal-color', c.main);
    ghost.style.setProperty('--goal-color-soft', c.soft);

    const weekDots = ghostGoal.week.map((d,i) => {
      const cls = ['day-dot', d ? 'done' : '', i === todayIdx ? 'today' : ''].filter(Boolean).join(' ');
      return `<div class="${cls}"></div>`;
    }).join('');

    ghost.innerHTML = `
      <div class="ghost-badge">Пример</div>
      <div class="goal-top">
        <div class="goal-icon" style="background:${c.soft}">
          <svg viewBox="0 0 24 24" fill="none" stroke="${c.main}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icons[ghostGoal.icon]}</svg>
        </div>
        <div class="streak-chip">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 4-3 5-3 9a3 3 0 0 0 6 0c1 1 2 3 2 5a5 5 0 0 1-10 0c0-6 5-7 5-14z"/></svg>
          ${ghostGoal.streak}
        </div>
      </div>
      <div class="goal-name">${ghostGoal.name}</div>
      <div class="goal-meta">${ghostGoal.meta}</div>
      <div class="week-track">${weekDots}</div>
      <button class="checkin-btn" disabled>Так будет выглядеть твоя цель</button>
    `;
    grid.appendChild(ghost);
    document.getElementById('goals-hint').textContent = 'ещё нет целей';
    return;
  }

  goals.forEach(g => {
    const c = colorVars[g.color];
    const card = document.createElement('div');
    card.className = 'goal-card';
    card.style.setProperty('--goal-color', c.main);
    card.style.setProperty('--goal-color-soft', c.soft);

    const weekDots = g.week.map((d,i) => {
      const cls = ['day-dot', d ? 'done' : '', i === todayIdx ? 'today' : ''].filter(Boolean).join(' ');
      return `<div class="${cls}"></div>`;
    }).join('');

    card.innerHTML = `
      <button class="goal-delete" data-id="${g.id}" aria-label="Удалить цель">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="goal-top">
        <div class="goal-icon" style="background:${c.soft}">
          <svg viewBox="0 0 24 24" fill="none" stroke="${c.main}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icons[g.icon]}</svg>
        </div>
        <div class="streak-chip">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 4-3 5-3 9a3 3 0 0 0 6 0c1 1 2 3 2 5a5 5 0 0 1-10 0c0-6 5-7 5-14z"/></svg>
          ${g.streak}
        </div>
      </div>
      <div class="goal-name">${g.name}</div>
      <div class="goal-meta">${g.meta}</div>
      <div class="week-track">${weekDots}</div>
      <button class="checkin-btn ${g.doneToday ? 'done' : 'pending'}" data-id="${g.id}">
        ${g.doneToday ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>Готово сегодня' : 'Отметить сегодня'}
      </button>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.checkin-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleGoal(parseInt(btn.dataset.id)));
  });
  grid.querySelectorAll('.goal-delete').forEach(btn => {
    btn.addEventListener('click', () => deleteGoal(parseInt(btn.dataset.id)));
  });

  document.getElementById('goals-hint').textContent = goals.length === 0 ? 'ещё нет целей' : goals.length + (goals.length === 1 ? ' цель' : ' цели');
}

function deleteGoal(id){
  goals = goals.filter(g => g.id !== id);
  renderGoals();
  renderSummary();
}

function toggleGoal(id){
  const g = goals.find(x => x.id === id);
  if (!g) return;
  g.doneToday = !g.doneToday;
  g.streak += g.doneToday ? 1 : -1;
  if (g.streak < 0) g.streak = 0;
  g.week[todayIdx] = g.doneToday ? 1 : 0;
  renderGoals();
  renderSummary();
}

function renderSummary(){
  const total = goals.length;

  if (total === 0){
    document.getElementById('summary-line').innerHTML =
      `Создай первую цель — и здесь появится твоя ежедневная сводка`;
    document.getElementById('best-streak').textContent = '0';
    return;
  }

  const doneCount = goals.filter(g => g.doneToday).length;
  const streakingCount = goals.filter(g => g.streak > 0).length;
  const best = Math.max(0, ...goals.map(g => g.streak));

  document.getElementById('summary-line').innerHTML =
    `<b>${doneCount} из ${total}</b> целей закрыто сегодня
     <span class="summary-dot"></span>
     <b>${streakingCount}</b> ${streakingCount === 1 ? 'цель держит стрик' : 'целей держат стрик'}
     <span class="summary-dot"></span>
     лучший результат — <b>${best} дней</b>`;

  document.getElementById('best-streak').textContent = best;
}

function renderEntries(){
  const list = document.getElementById('entry-list');
  list.innerHTML = entries.map(e => `
    <div class="entry-item">
      <div class="entry-date">${e.date}</div>
      <div class="entry-text">${e.text}</div>
    </div>
  `).join('');
}

document.getElementById('save-entry').addEventListener('click', () => {
  const input = document.getElementById('journal-input');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  entries.unshift({ date: now.toLocaleDateString('ru-RU', { day:'numeric', month:'short' }), text });
  input.value = '';
  renderEntries();
});

document.getElementById('theme-toggle').addEventListener('click', () => {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
});

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
  });
});

let selectedIcon = 'target';
let selectedColor = 'blue';

function renderPickers(){
  const iconPicker = document.getElementById('icon-picker');
  iconPicker.innerHTML = iconOrder.map(key => `
    <div class="icon-opt ${key === selectedIcon ? 'selected' : ''}" data-icon="${key}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icons[key]}</svg>
    </div>
  `).join('');
  iconPicker.querySelectorAll('.icon-opt').forEach(el => {
    el.addEventListener('click', () => { selectedIcon = el.dataset.icon; renderPickers(); });
  });

  const colorPicker = document.getElementById('color-picker');
  colorPicker.innerHTML = colorOrder.map(key => `
    <div class="color-opt ${key === selectedColor ? 'selected' : ''}" data-color="${key}" style="background:var(--${key})"></div>
  `).join('');
  colorPicker.querySelectorAll('.color-opt').forEach(el => {
    el.addEventListener('click', () => { selectedColor = el.dataset.color; renderPickers(); });
  });
}

const overlay = document.getElementById('modal-overlay');
const nameInput = document.getElementById('goal-name-input');
const metaInput = document.getElementById('goal-meta-input');

function openModal(){
  selectedIcon = 'target';
  selectedColor = 'blue';
  nameInput.value = '';
  metaInput.value = '';
  renderPickers();
  overlay.classList.add('open');
  setTimeout(() => nameInput.focus(), 50);
}
function closeModal(){ overlay.classList.remove('open'); }

document.querySelector('.add-goal-btn').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal(); });

document.getElementById('modal-submit').addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  const meta = metaInput.value.trim() || 'Без описания';
  goals.push({
    id: Date.now(),
    name, meta,
    color: selectedColor,
    icon: selectedIcon,
    streak: 0,
    week: [0,0,0,0,0,0,0],
    doneToday: false,
  });
  closeModal();
  renderGoals();
  renderSummary();
});

nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-submit').click();
});

renderDate();
renderGoals();
renderSummary();
renderEntries();
</script>
</body>
</html>
